<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Finance Tracker - Multi-currency expense tracking with AI predictions">
    <title>Finance Tracker — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="bg-particles" id="bgParticles"></div>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon">💰</div>
                <h1>Finance Tracker</h1>
                <p class="auth-subtitle">Multi-currency tracking with AI insights</p>
            </div>
            <div class="auth-tabs">
                <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Sign In</button>
                <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Sign Up</button>
            </div>
            <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter username" required>
                </div>
                <div class="input-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter password" required>
                </div>
                <button type="submit" class="auth-btn">Sign In →</button>
            </form>
            <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
                <div class="input-group">
                    <label for="regUsername">Username</label>
                    <input type="text" id="regUsername" placeholder="Choose username" required>
                </div>
                <div class="input-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" placeholder="Create password" required>
                </div>
                <button type="submit" class="auth-btn">Create Account →</button>
            </form>
            <div class="auth-message" id="authMessage"></div>
        </div>
        <div class="auth-features">
            <div class="feature-item"><span>💱</span> 12+ Currencies</div>
            <div class="feature-item"><span>🤖</span> AI Predictions</div>
            <div class="feature-item"><span>📊</span> Visual Analytics</div>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
